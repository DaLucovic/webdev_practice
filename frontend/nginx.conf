server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ───────────────────────────────────────────────────────────
    # try_files checks for: an exact file match, then a directory match,
    # then falls back to index.html. This is required for single-page apps:
    # without it, refreshing any non-root URL returns a 404 from nginx because
    # the file doesn't exist on disk — React Router (if added later) needs this.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # Mirrors what the Vite dev server does (see frontend/vite.config.ts).
    # The browser calls /api/calculate; nginx strips /api and forwards
    # /calculate to the FastAPI container. "backend" is the service name
    # defined in docker-compose.yml.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
